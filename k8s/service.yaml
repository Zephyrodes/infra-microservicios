apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: default
  labels:
    app: api-service
  annotations:
    # Indica al ServiceMonitor del Prometheus Operator que haga scrape a este Service
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
spec:
  type: ClusterIP          # Solo interno; usa port-forward para acceso en entornos restringidos
  selector:
    app: api-service
  ports:
    - name: http
      port: 80
      targetPort: http     # mapea al containerPort llamado "http" (3000)
      protocol: TCP
